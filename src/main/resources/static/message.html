<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Messages</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    :root{
      --bg:#eef3fb;
      --primary:#6f98dd;
      --secondary:#8ec8ad;
      --white:#fff;
      --text:#1f2937;
      --muted:#6b7280;
    }

    body{
      margin:0;
      font-family:Inter,Arial;
      background:var(--bg);
      display:flex;
      flex-direction:column;
      height:100vh;
    }

    /* HEADER */
    header{
      background:linear-gradient(135deg,var(--primary),var(--secondary));
      color:white;
      padding:16px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    button{
      border:none;
      border-radius:999px;
      padding:8px 12px;
      cursor:pointer;
    }

    /* CHAT AREA */
    .chat{
      flex:1;
      overflow-y:auto;
      padding:16px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    /* MESSAGE */
    .msg{
      max-width:70%;
      padding:10px 14px;
      border-radius:16px;
      font-size:14px;
      line-height:1.5;
    }

    /* therapist (left) */
    .msg.left{
      background:white;
      align-self:flex-start;
    }

    /* patient (right) */
    .msg.right{
      background:#dbeafe;
      align-self:flex-end;
    }

    /* reminder */
    .msg.reminder{
      background:#fef3c7;
      border:1px solid #facc15;
    }

    /* time */
    .time{
      font-size:11px;
      color:var(--muted);
      margin-top:4px;
    }

    /* INPUT AREA */
    .input-area{
      display:flex;
      gap:8px;
      padding:10px;
      background:white;
    }

    .input-area input{
      flex:1;
      padding:10px;
      border-radius:999px;
      border:1px solid #ccc;
    }

    .send-btn{
      background:var(--primary);
      color:white;
    }

    /* QUICK REPLIES */
    .quick{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      padding:10px;
    }

    .quick button{
      background:#e0f2fe;
      font-size:12px;
    }
  </style>
</head>

<body>

<header>
  <div>Messages</div>
  <button onclick="goBack()">Back</button>
</header>

<div id="chat" class="chat"></div>

<div class="quick">
  <button onclick="quickReply('I completed all tasks')">Completed</button>
  <button onclick="quickReply('I need more time')">Need time</button>
  <button onclick="quickReply('Can I book appointment?')">Appointment</button>
</div>

<div class="input-area">
  <input id="msgInput" placeholder="Type message..." />
  <button class="send-btn" onclick="sendMessage()">Send</button>
</div>

<script>
  let patientId = localStorage.getItem('patientId');

  if (!patientId) {
    window.location.href = '/';
  }

  async function loadMessages() {
    const res = await fetch('/api/patients/' + patientId + '/messages');
    const data = await res.json();

    const chat = document.getElementById('chat');
    chat.innerHTML = '';

    data.forEach(m => {
      const div = document.createElement('div');

      let cls = 'msg ';
      cls += (m.sender === 'PATIENT') ? 'right' : 'left';

      if (m.type === 'REMINDER') cls += ' reminder';

      div.className = cls;

      const time = new Date(m.createdAt).toLocaleString();

      div.innerHTML = `
      ${escapeHtml(m.content)}
      <div class="time">${time}</div>
    `;

      chat.appendChild(div);
    });

    chat.scrollTop = chat.scrollHeight;
  }

  async function sendMessage() {
    const input = document.getElementById('msgInput');
    const text = input.value.trim();
    if (!text) return;

    await fetch('/api/patients/' + patientId + '/messages/patient?content=' + encodeURIComponent(text), {
      method: 'POST'
    });

    input.value = '';
    loadMessages();
  }

  async function quickReply(text) {
    await fetch('/api/patients/' + patientId + '/messages/quick?content=' + encodeURIComponent(text), {
      method: 'POST'
    });

    loadMessages();
  }

  function goBack(){
    window.location.href = '/patient.html';
  }

  function escapeHtml(str){
    return str
            .replace(/&/g,'&amp;')
            .replace(/</g,'&lt;')
            .replace(/>/g,'&gt;');
  }

  /* AUTO REFRESH */
  setInterval(loadMessages, 3000);

  loadMessages();
</script>

</body>
</html>
