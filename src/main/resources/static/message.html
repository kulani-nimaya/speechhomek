<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Therapist Messages</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root{
      --bg:#eef3fb;
      --card:#ffffff;
      --text:#1f2937;
      --muted:#6b7280;
      --primary:#6f98dd;
      --primary2:#8ec8ad;
      --soft:#f6fbff;
      --soft-border:#dbeafb;
      --shadow:0 10px 28px rgba(15,23,42,.08);
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family:Inter,"Segoe UI",Arial,sans-serif;
      color:var(--text);
      background:linear-gradient(180deg,#f8fbff 0%,#eef3fb 100%);
    }

    header{
      background:linear-gradient(135deg,var(--primary),var(--primary2));
      color:#fff;
      padding:18px 18px 22px;
      border-bottom-left-radius:26px;
      border-bottom-right-radius:26px;
      box-shadow:0 10px 24px rgba(95,143,220,.2);
    }

    .top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }

    .back-btn{
      border:none;
      border-radius:999px;
      padding:10px 14px;
      background:rgba(255,255,255,.18);
      color:#fff;
      font-weight:700;
      cursor:pointer;
    }

    .title{
      font-size:22px;
      font-weight:800;
    }

    .subtitle{
      margin-top:4px;
      font-size:14px;
      opacity:.95;
    }

    .wrap{
      max-width:760px;
      margin:0 auto;
      padding:18px;
    }

    .message-list{
      display:grid;
      gap:14px;
    }

    .msg-card{
      background:var(--card);
      border-radius:20px;
      padding:16px;
      box-shadow:var(--shadow);
      border:1px solid rgba(219,227,238,.9);
    }

    .msg-bubble{
      background:var(--soft);
      border:1px solid var(--soft-border);
      border-radius:16px;
      padding:14px;
    }

    .msg-text{
      font-size:15px;
      line-height:1.65;
      color:#243447;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .msg-time{
      margin-top:10px;
      font-size:12px;
      color:var(--muted);
      text-align:right;
    }

    .empty{
      text-align:center;
      color:var(--muted);
      font-size:14px;
      background:var(--card);
      border-radius:20px;
      padding:22px;
      box-shadow:var(--shadow);
    }
  </style>
</head>
<body>
<header>
  <div class="top">
    <div>
      <div class="title">Therapist messages</div>
      <div class="subtitle">Your guidance and reminders</div>
    </div>
    <button class="back-btn" onclick="goBack()">Back</button>
  </div>
</header>

<div class="wrap">
  <div id="messageList" class="message-list"></div>
  <div id="emptyState" class="empty" style="display:none;">No messages yet.</div>
</div>

<script>
  let patientId = localStorage.getItem('patientId');

  if (!patientId) {
    window.location.href = '/';
  }

  async function loadMessages() {
    try {
      const res = await fetch('/api/patients/' + patientId + '/notes');
      if (!res.ok) return;

      const notes = await res.json();
      const list = document.getElementById('messageList');
      const empty = document.getElementById('emptyState');

      list.innerHTML = '';

      if (!notes || notes.length === 0) {
        empty.style.display = 'block';
        return;
      }

      empty.style.display = 'none';

      notes.forEach(n => {
        const card = document.createElement('div');
        card.className = 'msg-card';

        const d = new Date(n.createdAt);
        const dateStr = d.toLocaleString();

        card.innerHTML = `
                    <div class="msg-bubble">
                        <div class="msg-text">${escapeHtml(n.content || '')}</div>
                        <div class="msg-time">${dateStr}</div>
                    </div>
                `;

        list.appendChild(card);
      });
    } catch (e) {
      console.error('Error loading messages', e);
    }
  }

  function goBack() {
    window.location.href = '/patient.html';
  }

  function escapeHtml(str) {
    return str
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
  }

  loadMessages();
</script>
</body>
</html>
